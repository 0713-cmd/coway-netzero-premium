<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COWAY NetZero Road map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');
        :root { --cw-blue: #00A1E0; }
        body { font-family: 'Pretendard', sans-serif; background: #F8FAFC; color: #1E293B; letter-spacing: -0.04em; }
        
        .nav-tab {
            padding: 16px 36px; border-radius: 16px; font-weight: 800; font-size: 1.1rem;
            transition: all 0.3s ease; border: 2px solid #E2E8F0; background: #FFFFFF; color: #94A3B8; cursor: pointer;
        }
        .nav-tab.active { background: var(--cw-blue); color: #FFFFFF; border-color: var(--cw-blue); box-shadow: 0 10px 20px rgba(0, 161, 224, 0.2); }

        .glass-panel { background: #FFFFFF; border-radius: 32px; border: 1px solid #E2E8F0; height: 100%; display: flex; flex-direction: column; }
        .info-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .info-table th { background: #F1F5F9; color: #475569; padding: 10px; font-weight: 700; border-bottom: 1px solid #E2E8F0; text-align: center; }
        .info-table td { padding: 10px; border-bottom: 1px solid #F1F5F9; text-align: center; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #E2E8F0; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { height: 28px; width: 28px; border-radius: 50%; background: var(--cw-blue); cursor: pointer; -webkit-appearance: none; margin-top: -10px; border: 4px solid #FFF; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black" style="color: var(--cw-blue);">COWAY NetZero Road map</h1>
            <label class="cursor-pointer bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-black transition-all flex items-center gap-2 shadow-lg">
                <i class="fas fa-file-excel"></i> DATA LOAD
                <input type="file" id="excel-upload" class="hidden" accept=".xlsx">
            </label>
        </header>

        <nav class="flex space-x-4 mb-8">
            <button onclick="updateMenu('roadmap')" id="menu-roadmap" class="nav-tab active">📊 로드맵</button>
            <button onclick="updateMenu('methods')" id="menu-methods" class="nav-tab">🌱 감축수단</button>
            <button onclick="updateMenu('costs')" id="menu-costs" class="nav-tab">💰 투자분석</button>
        </nav>

        <div class="grid grid-cols-12 gap-6 mb-8">
            <div class="col-span-12 lg:col-span-3 flex flex-col gap-6">
                <div class="glass-panel p-6 text-center bg-blue-50/30 border-blue-100">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Focus Year</p>
                    <div class="text-6xl font-black italic" style="color: var(--cw-blue);" id="display-year">----</div>
                </div>
                <div class="glass-panel p-6 border-t-4" id="summary-border" style="border-color: var(--cw-blue);">
                    <h4 class="font-black text-sm text-slate-800 mb-6 flex items-center gap-2">
                        <i id="summary-icon" class="fas fa-leaf text-blue-500"></i> 실적 상세
                    </h4>
                    <div id="summary-data-list" class="space-y-4"></div>
                </div>
            </div>
            <div class="col-span-12 lg:col-span-9 glass-panel p-8">
                <div class="h-[500px] w-full"><canvas id="mainChart"></canvas></div>
            </div>
        </div>

        <div class="glass-panel p-8 mb-8">
            <div class="flex justify-between text-[10px] font-black text-slate-300 mb-6 uppercase tracking-widest">
                <span>Start 2023</span>
                <span></span>
                <span>Target 2050</span>
            </div>
            <input type="range" id="year-slider" min="0" max="27" value="0">
            <div class="flex justify-between mt-4 text-xs font-medium text-slate-500">
                <span>2023</span><span>2030</span><span>2040</span><span>2050</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div class="glass-panel p-6">
                <h5 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <span class="text-green-500">🌿</span> <span id="ghg-year-title">2023</span>년 온실가스 세부 현황
                </h5>
                <table class="info-table">
                    <thead><tr><th>경영 지표 항목</th><th>당해 실적 (톤)</th><th>23년~ 누적합</th></tr></thead>
                    <tbody id="ghg-table-body"></tbody>
                </table>
            </div>
            <div class="glass-panel p-6">
                <h5 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <span class="text-amber-500">💰</span> <span id="cost-year-title">2023</span>년 투자 손익 세부 현황
                </h5>
                <table class="info-table">
                    <thead><tr><th>경영 지표 항목</th><th>당해 실적 (억)</th><th>23년~ 누적합</th></tr></thead>
                    <tbody id="cost-table-body"></tbody>
                </table>
            </div>
            <div class="p-8 rounded-3xl border border-blue-100 bg-blue-50/20">
                <h6 class="text-xs font-black text-blue-400 uppercase mb-4 tracking-widest">🌱 온실가스 감축 상세 정보</h6>
                <p id="ghg-info-text" class="text-slate-600 font-medium leading-relaxed min-h-[50px]">-</p>
            </div>
            <div class="p-8 rounded-3xl border border-amber-100 bg-amber-50/20">
                <h6 class="text-xs font-black text-amber-400 uppercase mb-4 tracking-widest">💰 투자 및 재무 상세 정보</h6>
                <p id="cost-info-text" class="text-slate-600 font-medium leading-relaxed min-h-[50px]">-</p>
            </div>
        </div>
    </div>

    <script>
        let raw = []; let years = []; let menu = 'roadmap'; let chart = null;
        const fmt = (v, t) => {
            let n = Number(v) || 0;
            return t === 'cost' ? n.toLocaleString(undefined, {minimumFractionDigits: 1, maximumFractionDigits: 1}) : Math.round(n).toLocaleString();
        };

        document.getElementById('excel-upload').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => {
                const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                years = rows[0].slice(1); raw = rows.slice(1);
                document.getElementById('year-slider').max = years.length - 1;
                sync(0);
            };
            r.readAsArrayBuffer(e.target.files[0]);
        };

        const sync = (idx) => {
            idx = parseInt(idx); const yr = years[idx];
            document.getElementById('display-year').innerText = yr;
            document.getElementById('ghg-year-title').innerText = yr;
            document.getElementById('cost-year-title').innerText = yr;
            document.getElementById('ghg-info-text').innerText = raw[14][idx+1] || "-";
            document.getElementById('cost-info-text').innerText = raw[15][idx+1] || "-";
            updateSummary(idx); updateTables(idx); updateChart();
        };

        const updateSummary = (idx) => {
            const list = document.getElementById('summary-data-list'); list.innerHTML = "";
            const unit = menu === 'costs' ? '억' : '톤'; const t = menu === 'costs' ? 'cost' : 'ghg';
            let items = [];
            if (menu !== 'costs') {
                const exp = Number(raw[0][idx+1]) || 0; const tgt = Number(raw[1][idx+1]) || 0;
                const red = (Number(raw[2][idx+1]) || 0) + (Number(raw[3][idx+1]) || 0);
                items = [["목표 배출량", tgt], ["예상 배출량", exp], ["실제 배출량", exp - red], ["실제 감축량", red], ["감축 필요량", exp - tgt]];
            } else {
                let inv = 0; let mnt = 0; for(let r=9; r<=13; r++) { let v = Number(raw[r][idx+1]) || 0; if(v<0) inv += v; else mnt += v; }
                items = [["투자 비용", Math.abs(inv)], ["감축 비용", mnt], ["순비용", inv+mnt]];
            }
            items.forEach(i => {
                list.innerHTML += `<div class="flex justify-between items-center py-2 border-b border-slate-50">
                    <span class="text-slate-400 font-bold text-xs">${i[0]}</span>
                    <span class="font-black text-slate-800 text-base">${fmt(i[1], t)}<span class="text-[10px] ml-1 opacity-30">${unit}</span></span>
                </div>`;
            });
        };

        const updateTables = (idx) => {
            const sum = (r, e) => raw[r].slice(1, e + 2).reduce((a, b) => a + (Number(b) || 0), 0);
            const g = document.getElementById('ghg-table-body'); g.innerHTML = "";
            const exp = Number(raw[0][idx+1]) || 0; const tgt = Number(raw[1][idx+1]) || 0;
            const red = (Number(raw[2][idx+1]) || 0) + (Number(raw[3][idx+1]) || 0);
            const cR = sum(2, idx) + sum(3, idx);
            [["목표 배출량", tgt, "-"], ["예상 배출량", exp, sum(0, idx)], ["실제 배출량", exp-red, sum(0,idx)-cR], ["실제 감축량", red, cR], ["감축 필요량", exp-tgt, sum(0,idx)-sum(1,idx)]].forEach(r => {
                g.innerHTML += `<tr><td>${r[0]}</td><td class="font-bold">${fmt(r[1], 'ghg')}</td><td class="text-slate-400 font-semibold">${r[2]==='-'?'-':fmt(r[2], 'ghg')}</td></tr>`;
            });
            const c = document.getElementById('cost-table-body'); c.innerHTML = "";
            let iD=0, mD=0, iC=0, mC=0;
            for(let r=9; r<=13; r++) {
                let v = Number(raw[r][idx+1]) || 0; if(v<0) iD+=v; else mD+=v;
                for(let k=1; k<=idx+1; k++) { let nv = Number(raw[r][k]) || 0; if(nv<0) iC+=nv; else mC+=nv; }
            }
            [["투자비", Math.abs(iD), Math.abs(iC)], ["감축비", mD, mC], ["순비용", iD+mD, iC+mC]].forEach(r => {
                c.innerHTML += `<tr><td>${r[0]}</td><td class="font-bold">${fmt(r[1], 'cost')}</td><td class="text-slate-400 font-semibold">${fmt(r[2], 'cost')}</td></tr>`;
            });
        };

        const updateChart = () => {
            if (chart) chart.destroy();
            const ctx = document.getElementById('mainChart').getContext('2d');
            let ds = [];
            if (menu === 'roadmap') {
                ds = [
                    { label: '목표 배출량', data: raw[1].slice(1), backgroundColor: '#E2E8F0', type: 'bar' },
                    { label: '투자 감축량', data: raw[2].slice(1), backgroundColor: '#00A1E0', type: 'bar' },
                    { label: 'REC 구매', data: raw[3].slice(1), backgroundColor: '#93E1FF', type: 'bar' },
                    { label: '가이드라인', data: raw[1].slice(1), borderColor: '#FF4D4D', type: 'line', pointStyle: 'line', borderDash: [5, 5], borderWidth: 1 }
                ];
            } else if (menu === 'methods') {
                const cls = ['#00A1E0', '#00D1FF', '#74E8FF', '#B2F2FF', '#D9F7FF'];
                for(let i=4; i<=8; i++) ds.push({ label: raw[i][0], data: raw[i].slice(1), backgroundColor: cls[i-4], type: 'bar' });
            } else {
                const yI=[], yR=[], yN=[];
                for(let i=1; i<=years.length; i++) {
                    let sI=0, sR=0; for(let r=9; r<=13; r++) { let v = Number(raw[r][i])||0; if(v<0) sI+=v; else sR+=v; }
                    yI.push(Math.abs(sI)); yR.push(sR); yN.push(sI+sR);
                }
                ds = [{ label: '순비용', data: yN, type: 'bar', backgroundColor: yN.map(v => v < 0 ? '#FCA5A5' : '#93C5FD'), order: 2 },
                      { label: '투자비', data: yI, borderColor: '#2563EB', type: 'line', tension: 0.3, borderWidth: 2, order: 1 },
                      { label: '감축비', data: yR, borderColor: '#10B981', type: 'line', tension: 0.3, borderWidth: 2, order: 1 }];
            }
            chart = new Chart(ctx, {
                data: { labels: years, datasets: ds },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        x: { stacked: menu!=='costs', grid: { display: false }, ticks: { font: { size: 12 }, color: '#94A3B8' } },
                        y: { stacked: menu!=='costs', grid: { color: '#F8FAFC' }, ticks: { callback: (v) => fmt(v, menu==='costs'?'cost':'ghg') } }
                    },
                    plugins: { 
                        legend: { position: 'top', align: 'end', labels: { usePointStyle: true, boxWidth: 6, font: { size: 11, weight: '700' } } },
                        tooltip: { enabled: true, mode: 'index', intersect: false, callbacks: { label: (c) => `${c.dataset.label}: ${fmt(c.raw, menu==='costs'?'cost':'ghg')}` } }
                    }
                }
            });
        };

        const updateMenu = (m) => {
            menu = m; document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('menu-'+m).classList.add('active');
            const icon = document.getElementById('summary-icon'); const border = document.getElementById('summary-border');
            if(m === 'costs') { icon.className = "fas fa-coins text-amber-500"; border.style.borderColor = "#F59E0B"; }
            else { icon.className = "fas fa-tree text-blue-500"; border.style.borderColor = "#00A1E0"; }
            sync(document.getElementById('year-slider').value);
        };

        document.getElementById('year-slider').oninput = (e) => sync(e.target.value);
    </script>
</body>
</html>
