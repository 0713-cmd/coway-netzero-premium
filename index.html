<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COWAY NetZero Road map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');
        :root { --coway-blue: #00A1E0; }
        body { font-family: 'Pretendard', sans-serif; background: #F8FAFC; color: #1E293B; letter-spacing: -0.04em; }
        
        .nav-tab {
            padding: 16px 36px; border-radius: 16px; font-weight: 800; font-size: 1.1rem;
            transition: all 0.3s ease; border: 2px solid #E2E8F0; background: #FFFFFF; color: #94A3B8; cursor: pointer;
        }
        .nav-tab.active { background: var(--coway-blue); color: #FFFFFF; border-color: var(--coway-blue); box-shadow: 0 10px 20px rgba(0, 161, 224, 0.2); }

        .glass-panel { background: #FFFFFF; border-radius: 32px; border: 1px solid #E2E8F0; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.01); }
        .info-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .info-table th { background: #F1F5F9; color: #475569; padding: 10px; font-weight: 700; border-bottom: 1px solid #E2E8F0; text-align: center; }
        .info-table td { padding: 10px; border-bottom: 1px solid #F1F5F9; text-align: center; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #E2E8F0; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { height: 28px; width: 28px; border-radius: 50%; background: var(--coway-blue); cursor: pointer; -webkit-appearance: none; margin-top: -10px; border: 4px solid #FFF; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6 md:p-10">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black" style="color: var(--coway-blue);">COWAY NetZero Road map</h1>
            <label class="cursor-pointer bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-black transition-all flex items-center gap-2">
                <i class="fas fa-file-excel"></i> DATA LOAD
                <input type="file" id="excel-upload" class="hidden" accept=".xlsx">
            </label>
        </header>

        <nav class="flex space-x-4 mb-8">
            <button onclick="updateMenu('roadmap')" id="menu-roadmap" class="nav-tab active">📊 로드맵</button>
            <button onclick="updateMenu('methods')" id="menu-methods" class="nav-tab">🌱 감축수단</button>
            <button onclick="updateMenu('costs')" id="menu-costs" class="nav-tab">💰 투자분석</button>
        </nav>

        <div class="grid grid-cols-12 gap-6 mb-8">
            <div class="col-span-12 lg:col-span-3 flex flex-col gap-6">
                <div class="glass-panel p-6 text-center bg-blue-50/30 border-blue-100">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Focus Year</p>
                    <div class="text-5xl font-black italic" style="color: var(--coway-blue);" id="display-year">----</div>
                </div>
                <div class="glass-panel p-6 border-t-4" id="summary-border" style="border-color: var(--coway-blue);">
                    <h4 class="font-black text-sm text-slate-800 mb-6 flex items-center gap-2">
                        <i id="summary-icon" class="fas fa-leaf text-blue-500"></i> 실적 상세
                    </h4>
                    <div id="summary-data-list" class="space-y-4">
                        <p class="text-slate-300 italic text-xs">데이터 로드 필요</p>
                    </div>
                </div>
            </div>
            <div class="col-span-12 lg:col-span-9 glass-panel p-8">
                <div class="h-[500px] w-full">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>

        <div class="glass-panel p-8 mb-8">
            <div class="flex justify-between text-[10px] font-black text-slate-300 mb-6 uppercase tracking-widest">
                <span>Start 2023</span>
                <span></span> <span>Target 2050</span>
            </div>
            <input type="range" id="year-slider" min="0" max="27" value="0">
            <div class="flex justify-between mt-4 text-xs font-medium text-slate-500">
                <span>2023</span><span>2030</span><span>2040</span><span>2050</span>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-6 mb-8">
            <div class="col-span-12 lg:col-span-7 glass-panel p-6">
                <h5 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <span class="text-green-500">🌿</span> <span id="ghg-year">2023</span>년 온실가스 데이터 세부 현황
                </h5>
                <table class="info-table">
                    <thead><tr><th>경영 지표 항목</th><th>당해 실적 (톤)</th><th>2023년~ 누적 합계</th></tr></thead>
                    <tbody id="ghg-table-body"><tr><td colspan="3" class="py-10 opacity-30 italic">데이터 업로드 시 표시됩니다.</td></tr></tbody>
                </table>
            </div>
            <div class="col-span-12 lg:col-span-5 glass-panel p-6">
                <h5 class="text-sm font-bold text-slate-700 mb-4 flex items-center gap-2">
                    <span class="text-amber-500">💰</span> <span id="cost-year">2023</span>년 투자 및 손익 데이터 세부 현황
                </h5>
                <table class="info-table">
                    <thead><tr><th>경영 지표 항목</th><th>당해 실적 (억)</th><th>2023년~ 누적 합계</th></tr></thead>
                    <tbody id="cost-table-body"><tr><td colspan="3" class="py-10 opacity-30 italic">데이터 업로드 시 표시됩니다.</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-6">
            <div class="p-8 rounded-3xl border border-blue-100 bg-blue-50/20">
                <h6 class="text-xs font-black text-blue-400 uppercase mb-4 tracking-widest">🌱 온실가스 감축 세부 정보</h6>
                <p id="ghg-info-text" class="text-slate-600 font-medium leading-relaxed min-h-[50px]">-</p>
            </div>
            <div class="p-8 rounded-3xl border border-amber-100 bg-amber-50/20">
                <h6 class="text-xs font-black text-amber-400 uppercase mb-4 tracking-widest">💰 투자 및 재무 세부 정보</h6>
                <p id="cost-info-text" class="text-slate-600 font-medium leading-relaxed min-h-[50px]">-</p>
            </div>
        </div>
    </div>

    <script>
        let rawRows = []; let years = []; let currentMenu = 'roadmap'; let chart = null;

        const format = (v, type) => {
            let n = Number(v) || 0;
            if (type === 'cost') return n.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
            return Math.round(n).toLocaleString();
        };

        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const r = new FileReader();
            r.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, {type: 'array'});
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                    years = rows[0].slice(1);
                    rawRows = rows.slice(1);
                    document.getElementById('year-slider').max = years.length - 1;
                    refresh();
                } catch(err) { alert("데이터 로드 실패: 엑셀 형식을 확인하세요."); }
            };
            r.readAsArrayBuffer(e.target.files[0]);
        });

        function updateMenu(m) {
            currentMenu = m;
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('menu-' + m).classList.add('active');
            refresh();
        }

        function refresh() {
            if (rawRows.length === 0) return;
            const idx = parseInt(document.getElementById('year-slider').value);
            const Y = years[idx];
            document.getElementById('display-year').innerText = Y;
            document.getElementById('ghg-year').innerText = Y;
            document.getElementById('cost-year').innerText = Y;
            updateChart(); updateSummaryList(idx); updateTables(idx);
            document.getElementById('ghg-info-text').innerText = rawRows[14][idx+1] || "기록 없음";
            document.getElementById('cost-info-text').innerText = rawRows[15][idx+1] || "기록 없음";
        }

        function updateChart() {
            if (chart) chart.destroy();
            const ctx = document.getElementById('mainChart').getContext('2d');
            let ds = [];
            if (currentMenu === 'roadmap') {
                ds = [
                    { label: '목표 배출량', data: rawRows[1].slice(1), backgroundColor: '#E2E8F0', type: 'bar' },
                    { label: '투자 감축량', data: rawRows[2].slice(1), backgroundColor: '#00A1E0', type: 'bar' },
                    { label: 'REC 구매', data: rawRows[3].slice(1), backgroundColor: '#93E1FF', type: 'bar' },
                    { label: '가이드라인', data: rawRows[1].slice(1), borderColor: '#FF4D4D', type: 'line', pointStyle: 'line', borderDash: [5, 5], borderWidth: 1 }
                ];
            } else if (currentMenu === 'methods') {
                const colors = ['#00A1E0', '#00D1FF', '#74E8FF', '#B2F2FF', '#D9F7FF'];
                for(let i=4; i<=8; i++) ds.push({ label: rawRows[i][0], data: rawRows[i].slice(1), backgroundColor: colors[i-4], type: 'bar' });
            } else {
                const yI = []; const yR = []; const yN = [];
                for(let i=1; i<=years.length; i++) {
                    let sI = 0; let sR = 0;
                    for(let r=9; r<=13; r++) { let v = Number(rawRows[r][i]) || 0; if(v < 0) sI += v; else sR += v; }
                    yI.push(Math.abs(sI)); yR.push(sR); yN.push(sI + sR);
                }
                ds = [
                    { label: '순비용', data: yN, type: 'bar', backgroundColor: yN.map(v => v < 0 ? '#FCA5A5' : '#93C5FD'), order: 2 },
                    { label: '투자비', data: yI, borderColor: '#2563EB', type: 'line', tension: 0.3, borderWidth: 2, order: 1 },
                    { label: '감축비', data: yR, borderColor: '#10B981', type: 'line', tension: 0.3, borderWidth: 2, order: 1 }
                ];
            }
            chart = new Chart(ctx, {
                data: { labels: years, datasets: ds },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    onHover: null, // 마우스 호버로 바가 움직이는 문제 해결 (오직 슬라이더로만!)
                    scales: { 
                        x: { stacked: currentMenu !== 'costs', grid: { display: false }, ticks: { font: { size: 12, weight: '400' }, color: '#94A3B8' } },
                        y: { stacked: currentMenu !== 'costs', grid: { color: '#F8FAFC' }, ticks: { callback: (v) => format(v, currentMenu==='costs'?'cost':'ghg') } }
                    },
                    plugins: { 
                        legend: { position: 'top', align: 'end', labels: { usePointStyle: true, boxWidth: 6, font: { size: 11, weight: '700' } } },
                        tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${format(ctx.raw, currentMenu==='costs'?'cost':'ghg')}` } }
                    }
                }
            });
        }

        function updateSummaryList(idx) {
            const list = document.getElementById('summary-data-list');
            list.innerHTML = "";
            let items = []; const unit = currentMenu === 'costs' ? '억' : '톤';
            if (currentMenu !== 'costs') {
                const exp = Number(rawRows[0][idx+1]) || 0;
                const tgt = Number(rawRows[1][idx+1]) || 0;
                const red = (Number(rawRows[2][idx+1]) || 0) + (Number(rawRows[3][idx+1]) || 0);
                items.push(["목표 배출량", tgt], ["예상 배출량", exp], ["실제 배출량", exp - red], ["실제 감축량", red], ["감축 필요량", exp - tgt]);
            } else {
                let i = 0; let r = 0; for(let n=9; n<=13; n++) { let v = Number(rawRows[n][idx+1]) || 0; if(v < 0) i += v; else r += v; }
                items.push(["투자 비용", Math.abs(i)], ["감축 비용", r], ["순비용", i + r]);
            }
            items.forEach(item => {
                list.innerHTML += `<div class="flex justify-between items-center py-2 border-b border-slate-50">
                    <span class="text-slate-400 font-bold text-xs">${item[0]}</span>
                    <span class="font-black text-slate-800 text-sm">${format(item[1], currentMenu==='costs'?'cost':'ghg')}<span class="text-[8px] ml-1 opacity-30">${unit}</span></span>
                </div>`;
            });
        }

        function updateTables(idx) {
            const getC = (ri, ei) => rawRows[ri].slice(1, ei + 2).reduce((a, b) => a + (Number(b) || 0), 0);
            const gBody = document.getElementById('ghg-table-body'); gBody.innerHTML = "";
            const exp = Number(rawRows[0][idx+1]) || 0;
            const tgt = Number(rawRows[1][idx+1]) || 0;
            const red = (Number(rawRows[2][idx+1]) || 0) + (Number(rawRows[3][idx+1]) || 0);
            const cumRed = (getC(2, idx) + getC(3, idx));
            
            [["목표 배출량", tgt, "-"], ["예상 배출량", exp, getC(0, idx)], ["실제 배출량", exp - red, getC(0, idx) - cumRed], ["실제 감축량", red, cumRed], ["감축 필요량", exp - tgt, getC(0, idx) - getC(1, idx)]].forEach(r => {
                gBody.innerHTML += `<tr><td>${r[0]}</td><td class="font-bold">${format(r[1], 'ghg')}</td><td class="text-slate-400">${r[2]==='-'?'-':format(r[2], 'ghg')}</td></tr>`;
            });

            const cBody = document.getElementById('cost-table-body'); cBody.innerHTML = "";
            let iD = 0; let rD = 0; let iC = 0; let rC = 0;
            for(let r=9; r<=13; r++) {
                iD += (Number(rawRows[r][idx+1]) < 0 ? rawRows[r][idx+1] : 0); rD += (Number(rawRows[r][idx+1]) > 0 ? rawRows[r][idx+1] : 0);
                for(let i=1; i<=idx+1; i++) { let v = Number(rawRows[r][i]) || 0; if(v < 0) iC += v; else rC += v; }
            }
            [["투자비", Math.abs(iD), Math.abs(iC)], ["감축비", rD, rC], ["순비용", (iD+rD), (iC+rC)]].forEach(r => {
                cBody.innerHTML += `<tr><td>${r[0]}</td><td class="font-bold">${format(r[1], 'cost')}</td><td class="text-slate-400">${format(r[2], 'cost')}</td></tr>`;
            });
        }
    </script>
</body>
</html>
