<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COWAY NetZero Road map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');
        :root { --coway-blue: #00A1E0; }
        body { font-family: 'Pretendard', sans-serif; background: #FFFFFF; color: #1E293B; letter-spacing: -0.04em; }
        
        /* 탭 디자인 */
        .nav-tab {
            padding: 16px 40px; border-radius: 18px; font-weight: 800; font-size: 1.1rem;
            transition: all 0.3s ease; border: 2px solid #F1F5F9; background: #F8FAFC; color: #94A3B8; cursor: pointer;
        }
        .nav-tab.active { background: var(--coway-blue); color: #FFFFFF; border-color: var(--coway-blue); box-shadow: 0 10px 20px rgba(0, 161, 224, 0.25); }

        /* 패널 디자인 */
        .glass-panel { background: #FFFFFF; border-radius: 32px; border: 1px solid #F1F5F9; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02); }
        .info-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .info-table th { background: #F8FAFC; color: #64748B; padding: 12px 8px; font-weight: 700; border-bottom: 1px solid #E2E8F0; text-align: center; }
        .info-table td { padding: 12px 8px; border-bottom: 1px solid #F1F5F9; text-align: center; }
        
        /* 슬라이더 커스텀 */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; cursor: pointer; background: #E2E8F0; border-radius: 4px; }
        input[type=range]::-webkit-slider-thumb { height: 30px; width: 30px; border-radius: 50%; background: var(--coway-blue); cursor: pointer; -webkit-appearance: none; margin-top: -11px; border: 4px solid #FFF; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6 md:p-12 bg-[#FBFCFE]">

    <div class="max-w-[1550px] mx-auto">
        <header class="flex justify-between items-center mb-12">
            <h1 class="text-4xl font-black" style="color: var(--coway-blue);">COWAY NetZero Road map</h1>
            <label class="cursor-pointer bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-black transition-all flex items-center gap-2 shadow-lg">
                <i class="fas fa-file-excel"></i> DATA LOAD
                <input type="file" id="excel-upload" class="hidden" accept=".xlsx">
            </label>
        </header>

        <nav class="flex space-x-4 mb-10">
            <button onclick="updateMenu('roadmap')" id="menu-roadmap" class="nav-tab active">📊 로드맵</button>
            <button onclick="updateMenu('methods')" id="menu-methods" class="nav-tab">🌱 감축수단</button>
            <button onclick="updateMenu('costs')" id="menu-costs" class="nav-tab">💰 투자분석</button>
        </nav>

        <div class="grid grid-cols-12 gap-8 mb-10">
            <div class="col-span-12 lg:col-span-3 flex flex-col gap-6">
                <div class="glass-panel p-8 text-center bg-gradient-to-br from-[#F0F9FF] to-white border-[#E0F2FE]">
                    <p class="text-[10px] font-black text-[#7DD3FC] uppercase tracking-widest mb-1">Focus Year</p>
                    <div class="text-6xl font-black italic" style="color: var(--coway-blue);" id="display-year">----</div>
                </div>
                <div class="glass-panel p-8 flex-grow border-t-4" id="summary-border" style="border-color: var(--coway-blue);">
                    <h4 class="font-black text-lg text-slate-800 mb-6 flex items-center gap-2">
                        <i id="summary-icon" class="fas fa-tree text-blue-500"></i> 실적 상세
                    </h4>
                    <div id="summary-data-list" class="space-y-4">
                        <p class="text-slate-300 italic text-sm">데이터 업로드 필요</p>
                    </div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-9 glass-panel p-10">
                <div class="h-[520px] w-full">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>

        <div class="glass-panel p-10 mb-10">
            <div class="flex justify-between text-[10px] font-black text-slate-300 mb-6 px-1 uppercase tracking-widest">
                <span>Start 2023</span>
                <span style="color: var(--coway-blue)">NetZero Timeline Navigation</span>
                <span>Target 2050</span>
            </div>
            <input type="range" id="year-slider" min="0" max="27" value="0">
            <div class="flex justify-between px-1 mt-4 text-xs font-medium text-slate-500">
                <span>2023</span><span>2030</span><span>2035</span><span>2040</span><span>2045</span><span>2050</span>
            </div>
        </div>

        <div class="grid md:grid-cols-12 gap-8">
            <div class="col-span-12 lg:col-span-7 glass-panel p-8 overflow-hidden">
                <h5 class="flex items-center gap-2 text-slate-800 font-bold text-base mb-6">
                    <span class="text-green-500">🌿</span> <span id="ghg-table-title">2023년</span> 온실가스 데이터 세부 현황
                </h5>
                <table class="info-table" id="ghg-detail-table">
                    <thead>
                        <tr>
                            <th>경영 지표 항목</th>
                            <th>당해 실적 (톤)</th>
                            <th>2023년부터 누적 합계</th>
                        </tr>
                    </thead>
                    <tbody id="ghg-table-body">
                        <tr><td colspan="3" class="text-slate-300 py-10 italic">데이터 로드 시 활성화됩니다.</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="col-span-12 lg:col-span-5 glass-panel p-8 overflow-hidden">
                <h5 class="flex items-center gap-2 text-slate-800 font-bold text-base mb-6">
                    <span class="text-amber-500">💰</span> <span id="cost-table-title">2023년</span> 투자 및 손익 데이터 세부 현황
                </h5>
                <table class="info-table" id="cost-detail-table">
                    <thead>
                        <tr>
                            <th>경영 지표 항목</th>
                            <th>당해 실적 (억 원)</th>
                            <th>2023년부터 누적 합계</th>
                        </tr>
                    </thead>
                    <tbody id="cost-table-body">
                        <tr><td colspan="3" class="text-slate-300 py-10 italic">데이터 로드 시 활성화됩니다.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let rawRows = [];
        let years = [];
        let currentMenu = 'roadmap';
        let chart = null;

        const formatVal = (val, type) => {
            let n = Number(val) || 0;
            if (type === 'cost') return n.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
            return Math.round(n).toLocaleString();
        };

        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                years = rows[0].slice(1);
                rawRows = rows.slice(1);
                document.getElementById('year-slider').max = years.length - 1;
                refresh();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function updateMenu(menu) {
            currentMenu = menu;
            document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('menu-' + menu).classList.add('active');
            
            const icon = document.getElementById('summary-icon');
            const border = document.getElementById('summary-border');
            if(menu === 'costs') { 
                icon.className = "fas fa-coins text-amber-500"; 
                border.style.borderColor = "#F59E0B";
            } else { 
                icon.className = "fas fa-tree text-blue-500"; 
                border.style.borderColor = "#00A1E0";
            }
            refresh();
        }

        function refresh() {
            if (rawRows.length === 0) return;
            const idx = parseInt(document.getElementById('year-slider').value);
            const yearStr = years[idx];
            document.getElementById('display-year').innerText = yearStr;
            document.getElementById('ghg-table-title').innerText = yearStr + "년";
            document.getElementById('cost-table-title').innerText = yearStr + "년";
            
            updateChart();
            updateSummaryList(idx);
            updateBottomTables(idx);
        }

        function updateChart() {
            if (chart) chart.destroy();
            const ctx = document.getElementById('mainChart').getContext('2d');
            let datasets = [];

            if (currentMenu === 'roadmap') {
                datasets = [
                    { label: '목표 배출량', data: rawRows[1].slice(1), backgroundColor: '#E2E8F0', type: 'bar' },
                    { label: '투자 감축량', data: rawRows[2].slice(1), backgroundColor: '#00A1E0', type: 'bar' },
                    { label: 'REC 구매', data: rawRows[3].slice(1), backgroundColor: '#93E1FF', type: 'bar' },
                    { label: '가이드라인', data: rawRows[1].slice(1), borderColor: '#FF4D4D', type: 'line', pointStyle: 'line', borderDash: [5, 5], borderWidth: 2 }
                ];
            } else if (currentMenu === 'methods') {
                const colors = ['#00A1E0', '#00D1FF', '#74E8FF', '#B2F2FF', '#D9F7FF'];
                for(let i=4; i<=8; i++) {
                    datasets.push({ label: rawRows[i][0], data: rawRows[i].slice(1), backgroundColor: colors[i-4], type: 'bar' });
                }
            } else {
                const yInv = []; const yRed = []; const yNet = [];
                for(let i=1; i<=years.length; i++) {
                    let invSum = 0; let redSum = 0;
                    for(let r=9; r<=13; r++) {
                        const v = Number(rawRows[r][i]) || 0;
                        if(v < 0) invSum += v; else redSum += v;
                    }
                    yInv.push(Math.abs(invSum)); yRed.push(redSum); yNet.push(invSum + redSum);
                }
                datasets = [
                    { label: '연도별 순비용', data: yNet, type: 'bar', backgroundColor: yNet.map(v => v < 0 ? '#FCA5A5' : '#93C5FD'), order: 2 },
                    { label: '투자 비용', data: yInv, borderColor: '#2563EB', type: 'line', tension: 0.3, borderWidth: 3, order: 1 },
                    { label: '감축 비용', data: yRed, borderColor: '#10B981', type: 'line', tension: 0.3, borderWidth: 3, order: 1 }
                ];
            }

            chart = new Chart(ctx, {
                data: { labels: years, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    onHover: (e, el) => { if(el.length > 0) { document.getElementById('year-slider').value = el[0].index; refresh(); } },
                    scales: { 
                        x: { 
                            stacked: currentMenu !== 'costs', 
                            grid: { display: false },
                            ticks: { font: { size: 12, weight: 'normal' }, color: '#94A3B8' } 
                        },
                        y: { 
                            stacked: currentMenu !== 'costs', 
                            grid: { color: '#F8FAFC' },
                            ticks: { callback: (v) => formatVal(v, currentMenu==='costs'?'cost':'ghg') }
                        }
                    },
                    plugins: { 
                        legend: { position: 'top', align: 'end', labels: { usePointStyle: true, boxWidth: 8, font: { size: 11, weight: 'bold' } } },
                        tooltip: { 
                            callbacks: { label: (ctx) => `${ctx.dataset.label}: ${formatVal(ctx.raw, currentMenu==='costs'?'cost':'ghg')}` }
                        }
                    }
                }
            });
        }

        function updateSummaryList(idx) {
            const list = document.getElementById('summary-data-list');
            list.innerHTML = "";
            let items = [];
            const unit = currentMenu === 'costs' ? '억' : '톤';

            if (currentMenu !== 'costs') {
                items.push(["목표 배출량", rawRows[1][idx+1]]);
                items.push(["예상 배출량", rawRows[0][idx+1]]);
                items.push(["실제 감축량", (Number(rawRows[2][idx+1]) || 0) + (Number(rawRows[3][idx+1]) || 0)]);
            } else {
                let inv = 0; let red = 0;
                for(let r=9; r<=13; r++) { const v = Number(rawRows[r][idx+1]) || 0; if(v < 0) inv += v; else red += v; }
                items.push(["투자 비용", Math.abs(inv)]);
                items.push(["감축 비용", red]);
                items.push(["순비용", inv + red]);
            }

            items.forEach(item => {
                list.innerHTML += `
                    <div class="flex justify-between items-center py-3 border-b border-slate-50 last:border-none">
                        <span class="text-slate-400 font-bold text-xs">${item[0]}</span>
                        <span class="font-black text-slate-800 text-lg">${formatVal(item[1], currentMenu==='costs'?'cost':'ghg')}<span class="text-[10px] ml-1 opacity-40">${unit}</span></span>
                    </div>`;
            });
        }

        function updateBottomTables(idx) {
            const getCum = (rowIdx, endIdx) => rawRows[rowIdx].slice(1, endIdx + 2).reduce((a, b) => a + (Number(b) || 0), 0);
            
            // 온실가스 표
            const ghgBody = document.getElementById('ghg-table-body');
            ghgBody.innerHTML = "";
            const ghgRows = [
                ["넷제로 목표 배출량 (톤)", rawRows[1][idx+1], "-"],
                ["예상 배출량 (톤)", rawRows[0][idx+1], getCum(0, idx)],
                ["감축 필요량 (톤)", (Number(rawRows[0][idx+1]) - Number(rawRows[1][idx+1])), "-"],
                ["실제 감축량 (톤)", (Number(rawRows[2][idx+1]) + Number(rawRows[3][idx+1])), getCum(2, idx) + getCum(3, idx)],
                ["추가 감축 필요량 (톤)", (Number(rawRows[0][idx+1]) - Number(rawRows[1][idx+1]) - (Number(rawRows[2][idx+1]) + Number(rawRows[3][idx+1]))), "-"]
            ];
            ghgRows.forEach(r => {
                ghgBody.innerHTML += `<tr><td>${r[0]}</td><td class="font-bold">${formatVal(r[1], 'ghg')}</td><td class="text-slate-400">${r[2] === '-' ? '-' : formatVal(r[2], 'ghg')}</td></tr>`;
            });

            // 투자 손익 표
            const costBody = document.getElementById('cost-table-body');
            costBody.innerHTML = "";
            let inv 당해 = 0; let red 당해 = 0; let inv 누적 = 0; let red 누적 = 0;
            for(let r=9; r<=13; r++) {
                const v = Number(rawRows[r][idx+1]) || 0;
                if(v < 0) inv 당해 += v; else red 당해 += v;
                for(let i=1; i<=idx+1; i++) {
                    const nv = Number(rawRows[r][i]) || 0;
                    if(nv < 0) inv 누적 += nv; else red 누적 += nv;
                }
            }
            const costRows = [
                ["투자 비용 (억 원)", Math.abs(inv 당해), Math.abs(inv 누적)],
                ["감축 비용 (억 원)", red 당해, red 누적],
                ["연도별 비용 (억 원)", (inv 당해 + red 당해), (inv 누적 + red 누적)]
            ];
            costRows.forEach(r => {
                costBody.innerHTML += `<tr><td>${r[0]}</td><td class="font-bold">${formatVal(r[1], 'cost')}</td><td class="text-slate-400">${formatVal(r[2], 'cost')}</td></tr>`;
            });
        }

        document.getElementById('year-slider').addEventListener('input', refresh);
    </script>
</body>
</html>
